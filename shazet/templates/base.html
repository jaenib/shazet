<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}shazet{% endblock %}</title>
  <link rel="stylesheet" href="{{ BASE }}/static/shazet.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ BASE }}/">shazet</a>
    <nav>
      <a href="{{ BASE }}/">new</a>
      <a href="{{ BASE }}/sets">sets</a>
      <a href="{{ BASE }}/tracks">tracks</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <span>shazet — tracklists from DJ sets, with receipts.</span>
  </footer>
  <script src="{{ BASE }}/static/shazet.js"></script>
</body>
</html>
